name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  max-code-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile MAX package
        run: python -m compileall max_barbershop_bot

      - name: Check forbidden transport imports in MAX code
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path("max_barbershop_bot")
          patterns = [
              (re.compile(r"from\s+" + "aio" + r"gram\b|import\s+" + "aio" + r"gram\b"), "forbidden transport import"),
              (re.compile(r"InlineKeyboardMarkup|InlineKeyboardButton|ReplyKeyboardMarkup|KeyboardButton"), "forbidden keyboard class"),
              (re.compile("Клиент записался из " + "телеграм" + " бота", re.IGNORECASE), "forbidden legacy marker"),
          ]
          failures = []
          for path in root.rglob("*.py"):
              text = path.read_text(encoding="utf-8")
              for pattern, label in patterns:
                  if pattern.search(text):
                      failures.append(f"{path}: {label}")
          if failures:
              print("\n".join(failures))
              sys.exit(1)
          PY
